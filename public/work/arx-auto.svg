<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect width="1200" height="750" rx="12" fill="#111"/>
  <rect y="0" width="1200" height="36" rx="12" fill="#1a1a1a"/>
  <circle cx="20" cy="18" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="38" cy="18" r="5" fill="#eab308" opacity="0.7"/>
  <circle cx="56" cy="18" r="5" fill="#22c55e" opacity="0.7"/>
  <rect x="200" y="10" width="800" height="16" rx="8" fill="#0a0a0a"/>
  <text x="600" y="22" text-anchor="middle" font-family="system-ui" font-size="9" fill="#555">arx-auto.vercel.app</text>
  <!-- Content area -->
  <rect x="0" y="36" width="1200" height="714" fill="url(#bg1)"/>
  <!-- Nav bar -->
  <rect x="40" y="56" width="120" height="20" rx="4" fill="#222"/>
  <rect x="900" y="56" width="60" height="20" rx="4" fill="#222"/>
  <rect x="980" y="56" width="60" height="20" rx="4" fill="#222"/>
  <rect x="1060" y="56" width="100" height="20" rx="4" fill="url(#accent1)" opacity="0.6"/>
  <!-- Hero text -->
  <rect x="80" y="180" width="500" height="40" rx="6" fill="#f5f5f5" opacity="0.9"/>
  <rect x="80" y="235" width="380" height="30" rx="6" fill="#f5f5f5" opacity="0.5"/>
  <rect x="80" y="290" width="450" height="16" rx="4" fill="#555"/>
  <rect x="80" y="316" width="350" height="16" rx="4" fill="#555"/>
  <!-- CTA buttons -->
  <rect x="80" y="360" width="140" height="40" rx="8" fill="url(#accent1)"/>
  <rect x="240" y="360" width="140" height="40" rx="8" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Car cards grid -->
  <rect x="80" y="460" width="320" height="220" rx="10" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="80" y="460" width="320" height="140" rx="10" fill="#252535"/>
  <rect x="440" y="460" width="320" height="220" rx="10" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="440" y="460" width="320" height="140" rx="10" fill="#252535"/>
  <rect x="800" y="460" width="320" height="220" rx="10" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  <rect x="800" y="460" width="320" height="140" rx="10" fill="#252535"/>
  <!-- Card details -->
  <rect x="95" y="615" width="180" height="14" rx="3" fill="#ccc" opacity="0.6"/>
  <rect x="95" y="640" width="120" height="12" rx="3" fill="#666"/>
  <rect x="95" y="660" width="80" height="10" rx="3" fill="url(#accent1)" opacity="0.5"/>
  <rect x="455" y="615" width="160" height="14" rx="3" fill="#ccc" opacity="0.6"/>
  <rect x="455" y="640" width="100" height="12" rx="3" fill="#666"/>
  <rect x="455" y="660" width="80" height="10" rx="3" fill="url(#accent1)" opacity="0.5"/>
  <rect x="815" y="615" width="200" height="14" rx="3" fill="#ccc" opacity="0.6"/>
  <rect x="815" y="640" width="130" height="12" rx="3" fill="#666"/>
  <rect x="815" y="660" width="80" height="10" rx="3" fill="url(#accent1)" opacity="0.5"/>
</svg>
